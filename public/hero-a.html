<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hero Mock A — Immersive Stage</title>
<style>
  :root { --red:#e8404a; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; overflow-x:hidden; }
  .tag { position:fixed; top:10px; left:10px; z-index:99; font-size:11px; letter-spacing:.1em; color:rgba(255,255,255,.4); background:rgba(255,255,255,.06); padding:5px 10px; border-radius:6px; }

  /* NAV — logo small + present (the thoughtful placement) */
  nav { position:fixed; top:0; left:0; right:0; z-index:50; display:flex; align-items:center; justify-content:space-between;
        padding:0 2.5rem; height:64px; backdrop-filter:blur(16px); background:rgba(0,0,0,.35); }
  nav img { height:34px; width:auto; }
  .links { display:flex; align-items:center; gap:26px; font-size:13px; letter-spacing:.02em; }
  .links a { color:rgba(255,255,255,.62); text-decoration:none; transition:color .2s; }
  .links a:hover { color:#fff; }
  .start { padding:8px 18px; border:1px solid rgba(255,255,255,.25); border-radius:6px; color:#fff !important; }

  /* HERO — full-bleed cinematic stage */
  .hero { position:relative; height:100svh; min-height:640px; display:flex; flex-direction:column;
          align-items:center; justify-content:flex-end; padding-bottom:9vh; overflow:hidden; }
  /* the "live light show" stage */
  .stage { position:absolute; inset:0; z-index:0; }
  .glow { position:absolute; left:50%; top:42%; transform:translate(-50%,-50%); width:90vw; height:60vh;
          background:radial-gradient(ellipse, rgba(232,64,74,.22) 0%, transparent 65%); animation:breathe 2.4s ease-in-out infinite; }
  @keyframes breathe { 0%,100%{opacity:.55; transform:translate(-50%,-50%) scale(1);} 50%{opacity:1; transform:translate(-50%,-50%) scale(1.08);} }
  /* light streaks echoing the logo */
  .beam { position:absolute; top:44%; height:2px; width:46%; filter:blur(.5px); opacity:.9; }
  .beam.l { left:0; background:linear-gradient(90deg, transparent, #fff); animation:flick 1.2s ease-in-out infinite; }
  .beam.r { right:0; background:linear-gradient(270deg, transparent, var(--red)); animation:flick 1.2s ease-in-out infinite .15s; }
  @keyframes flick { 0%,100%{opacity:.35;} 50%{opacity:1; box-shadow:0 0 22px currentColor;} }
  /* equalizer = the music made visible */
  .eq { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); display:flex; align-items:center; gap:5px; height:34vh; }
  .eq i { width:7px; border-radius:4px; background:linear-gradient(#fff, var(--red)); transform-origin:center;
          animation:bounce 1.1s ease-in-out infinite; box-shadow:0 0 12px rgba(232,64,74,.4); }
  @keyframes bounce { 0%,100%{transform:scaleY(.12);} 50%{transform:scaleY(1);} }
  .scrim { position:absolute; inset:0; z-index:1; background:linear-gradient(180deg, rgba(0,0,0,.45) 0%, transparent 30%, transparent 55%, rgba(0,0,0,.85) 100%); }

  .copy { position:relative; z-index:2; text-align:center; }
  h1 { font-size:clamp(2.6rem,7vw,5.5rem); font-weight:600; line-height:.98; letter-spacing:-2px; }
  h1 .red { background:linear-gradient(120deg,#e8404a,#ff6a3d); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .sub { margin:18px auto 30px; font-size:clamp(.9rem,1.6vw,1.05rem); color:rgba(255,255,255,.55); max-width:460px; line-height:1.6; }
  .cta { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
  .btn { padding:14px 30px; border-radius:7px; font-size:14px; font-weight:600; letter-spacing:.01em; text-decoration:none; transition:all .2s; }
  .btn.p { background:var(--red); color:#fff; box-shadow:0 0 40px rgba(232,64,74,.35); }
  .btn.p:hover { background:#fff; color:#000; }
  .btn.s { border:1px solid rgba(255,255,255,.28); color:#fff; }
  .btn.s:hover { background:rgba(255,255,255,.1); }
  .unmute { position:absolute; bottom:3vh; left:50%; transform:translateX(-50%); z-index:2; font-size:12px; color:rgba(255,255,255,.5);
            display:flex; align-items:center; gap:7px; }
  .unmute span { width:26px; height:26px; border:1px solid rgba(255,255,255,.25); border-radius:50%; display:inline-flex; align-items:center; justify-content:center; }
</style>
</head>
<body>
<div class="tag">MOCK A · Immersive Stage</div>
<nav>
  <img src="/brand/logo.png" alt="That Lightshow" />
  <div class="links">
    <a href="#">Gallery</a><a href="#">Pricing</a><a href="#">Sign in</a>
    <a class="start" href="#">Start free</a>
  </div>
</nav>

<section class="hero">
  <div class="stage">
    <div class="glow"></div>
    <div class="beam l"></div><div class="beam r"></div>
    <div class="eq" id="eq"></div>
  </div>
  <div class="scrim"></div>
  <div class="copy">
    <h1>Your music.<br><span class="red">Your light show.</span></h1>
    <p class="sub">Upload any song. Watch your Tesla's lights, doors, and cabin dance to every beat. Export to USB in seconds.</p>
    <div class="cta">
      <a class="btn p" href="#">Build your first show →</a>
      <a class="btn s" href="#">Watch the gallery</a>
    </div>
  </div>
  <div class="unmute"><span>♪</span> Tap to hear it</div>
</section>

<script>
  // build a music-reactive equalizer (stand-in for the live 3D show)
  const eq = document.getElementById('eq');
  for (let i=0;i<48;i++){ const b=document.createElement('i');
    b.style.animationDelay = (Math.random()*-1.1)+'s';
    b.style.animationDuration = (0.7+Math.random()*0.8)+'s';
    b.style.height = (30+Math.random()*70)+'%';
    eq.appendChild(b); }
</script>
</body>
</html>
